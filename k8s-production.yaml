# Production-ready Kubernetes deployment with additional security and reliability features

apiVersion: v1
kind: ServiceAccount
metadata:
  name: devbcn-app
  namespace: devbcn-conference

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devbcn-network-policy
  namespace: devbcn-conference
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  - from:
    - podSelector: {}
  egress:
  - to:
    - podSelector: {}
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: devbcn-conference
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: devbcn-conference
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: devbcn-conference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: devbcn-conference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Security Context and additional production configurations
# These would be applied to the existing deployments by patching them
# or by modifying the original deployment files

# Example patch for backend deployment:
# kubectl patch deployment backend -n devbcn-conference -p '{"spec":{"template":{"spec":{"serviceAccountName":"devbcn-app","securityContext":{"runAsNonRoot":true,"runAsUser":1000,"fsGroup":2000}}}}}'
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: devbcn-conference
data:
  # Database configuration
  POSTGRES_DB: "conference_db"
  POSTGRES_USER: "conference_user"
  DATABASE_URL: "postgresql://conference_user:conference_pass@postgres-service:5432/conference_db"
  
  # Frontend configuration
  REACT_APP_API_URL: "http://backend-service:8000"
  
  # Monitoring configuration
  DATA_SOURCE_NAME: "postgresql://conference_user:conference_pass@postgres-service:5432/conference_db?sslmode=disable"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: devbcn-conference
type: Opaque
data:
  # Base64 encoded values
  POSTGRES_PASSWORD: Y29uZmVyZW5jZV9wYXNz  # conference_pass
  GF_SECURITY_ADMIN_PASSWORD: YWRtaW4=  # admin